    <!-- FAQPage Schema: Homepage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is an active foodie tour?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "An active foodie tour combines physical activity — walking, hiking, or cycling through a destination — with deep immersion in regional food culture. On a Whole Journeys active foodie trip, guests typically hike or walk between villages and farms, meet local producers and winemakers, participate in cooking classes or cheese-making sessions, and eat where locals eat rather than at tourist restaurants."
          }
        },
        {
          "@type": "Question",
          "name": "How are Whole Journeys trips different from other small group tours?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Whole Journeys trips are designed and personally led by Kathy Dragon, who has more than 30 years of experiential travel expertise and has escorted over 3,000 guests worldwide. Groups are limited to a maximum of 12-16 guests. Itineraries are built around direct relationships with local producers, farmers, winemakers, and artisans that come from decades of on-the-ground relationship-building — access that no catalog operator can replicate."
          }
        },
        {
          "@type": "Question",
          "name": "Can Whole Journeys design a private custom itinerary?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Most Whole Journeys trips are private, custom-designed itineraries built around each group's specific interests, fitness level, and travel style. Kathy Dragon consults with guests to understand their priorities and designs an itinerary accordingly. A non-refundable trip planning fee of $600 applies after the initial complimentary consultation, and is waived for group departures. Contact Kathy at kathy@wholejourneys.com."
          }
        },
        {
          "@type": "Question",
          "name": "What is the Alpe Adria Trail?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Alpe Adria Trail is a 750-kilometer long-distance hiking route crossing Austria, Slovenia, and Italy from the Grossglockner glacier to the Adriatic coast. It was named among the seven best trails in the world by National Geographic Traveller. Whole Journeys offers guided hiking on the Alpe Adria with luggage transfers, boutique accommodations, and a maximum group size of 12 guests."
          }
        },
        {
          "@type": "Question",
          "name": "Does Whole Journeys offer women's-only hiking trips?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Whole Journeys runs women's-only hiking adventures, including the 2026 Women's Highlights of the Camino de Santiago and the Slovenia Women's Hike along the Juliana Trail, Alpe Adria, and Soča Valley. These trips are guided by Kathy Dragon and feature local women experts at key points along the route."
          }
        }
      ]
    }
    </script>
