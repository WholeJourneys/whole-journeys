                sea: "text-blue-600",
                coast: "text-teal-600",
                forest: "text-emerald-600",
                alpine: "text-indigo-600",

                            </div>
                            <div className="p-6 space-y-4 flex-grow flex flex-col">
                                <div className="inline-block px-3 py-1 bg-indigo-50 text-indigo-700 text-xs font-black rounded-full w-fit">{day.hotel.note}</div>
                                <div className="space-y-3 text-sm flex-grow">
                                    <div className="flex items-start text-slate-600"><Icon name="MapPin" className="w-4 h-4 mr-3 text-slate-400 shrink-0 mt-0.5" /><span>{day.hotel.address}</span></div>
                                    <div className="flex items-center text-slate-600"><Icon name="Phone" className="w-4 h-4 mr-3 text-slate-400 shrink-0" /><a href={`tel:${day.hotel.phone.replace(/\s+/g, '')}`}>{day.hotel.phone}</a></div>
                                </div>
                                <a href={day.hotel.url} target="_blank" className="w-full flex items-center justify-center bg-slate-900 text-white py-3 rounded-2xl hover:bg-indigo-700 transition-all font-bold text-sm">Visit Website <Icon name="ExternalLink" className="w-4 h-4 ml-2" /></a>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        function MapView() {
            return (
                <div className="space-y-8">
                    {/* Google My Maps Link */}
                    <a
                        href="https://www.google.com/maps/d/u/0/edit?mid=1cHINraNVWMPCkzYchdHiqkmx3LHKdvg&usp=sharing"
                        target="_blank"
                        rel="noopener noreferrer"
                        className="flex items-center justify-between bg-gradient-to-r from-teal-600 to-blue-600 text-white rounded-3xl p-5 shadow-md hover:shadow-lg hover:from-teal-500 hover:to-blue-500 transition-all group"
                    >
                        <div className="flex items-center space-x-4">
                            <div className="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center shrink-0">
                                <Icon name="Map" className="w-6 h-6 text-white" />
                            </div>
                            <div>
                                <p className="font-bold text-lg text-white">Open Interactive Google Map</p>
                                <p className="text-teal-100 text-sm">All hotels & activity locations pinned — tap any marker for details</p>
                            </div>
                        </div>
                        <Icon name="ExternalLink" className="w-5 h-5 text-white/80 group-hover:text-white shrink-0 ml-4" />
                    </a>

                    <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 md:p-8 relative overflow-hidden">
                        <div className="relative z-10">
                            <h3 className="text-2xl font-black flex items-center text-slate-800 mb-2">
                                <Icon name="Navigation" className="w-6 h-6 mr-3 text-teal-500" />
                                Route Overview
                            </h3>
                            <p className="text-slate-500 text-sm mb-6 uppercase tracking-wider font-bold">Sea to Mountains Journey</p>
                        </div>
                        
                        <div className="w-full bg-slate-50 rounded-3xl border border-slate-200 relative p-4 md:p-6 overflow-hidden">
                            <svg viewBox="0 0 800 300" className="w-full drop-shadow-sm">
                                <rect x="600" y="0" width="200" height="450" fill="#e0f2fe" opacity="0.6" />
                                <path d="M0 0 H600 Q650 150 620 250 T650 450 H0 V0" fill="#f8fafc" stroke="#e2e8f0" strokeWidth="2" />
                                <g opacity="0.3">
                                    <path d="M50 350 L100 250 L150 350 Z" fill="#94a3b8" />
                                    <path d="M120 380 L180 280 L240 380 Z" fill="#94a3b8" />
                                    <path d="M200 340 L250 260 L300 340 Z" fill="#94a3b8" />
                                    <path d="M20 400 L80 300 L140 400 Z" fill="#94a3b8" />
                                </g>
                                <text x="700" y="225" textAnchor="middle" fill="#0ea5e9" fontSize="12" fontWeight="bold" opacity="0.4" transform="rotate(90, 700, 225)">Mediterranean Sea</text>
                                <text x="100" y="420" fill="#64748b" fontSize="11" fontWeight="bold" opacity="0.4">Pyrenees Mountains</text>
                                <path d="M620 200 L550 250 L450 180 L250 220 L100 150" fill="none" stroke="#cbd5e1" strokeWidth="3" strokeDasharray="8 8" />
                                <g>
                                    <circle cx="620" cy="200" r="10" fill="#06b6d4" />
                                    <text x="635" y="190" fontSize="13" fontWeight="bold" fill="#1e293b">Cap de Creus</text>
                                    <text x="635" y="205" fontSize="10" fill="#94a3b8">Day 2</text>
                                    <circle cx="550" cy="250" r="8" fill="#3b82f6" />
                                    <text x="540" y="275" textAnchor="middle" fontSize="13" fontWeight="bold" fill="#1e293b">Girona</text>
                                    <text x="540" y="290" textAnchor="middle" fontSize="10" fill="#94a3b8">Day 1 Arrival</text>
                                    <circle cx="450" cy="180" r="8" fill="#10b981" />
                                    <text x="450" y="165" textAnchor="middle" fontSize="13" fontWeight="bold" fill="#1e293b">Garrotxa & Camprodon</text>
                                    <text x="450" y="200" textAnchor="middle" fontSize="10" fill="#94a3b8">Day 3</text>
                                    <circle cx="250" cy="220" r="8" fill="#6366f1" />
                                    <text x="250" y="245" textAnchor="middle" fontSize="13" fontWeight="bold" fill="#1e293b">Sort & Pallaresa River</text>
                                    <text x="250" y="260" textAnchor="middle" fontSize="10" fill="#94a3b8">Day 4 & 5</text>
                                    <circle cx="100" cy="150" r="10" fill="#1e293b" />
                                    <text x="100" y="130" textAnchor="middle" fontSize="13" fontWeight="bold" fill="#1e293b">Val d'Aran</text>
                                    <text x="100" y="175" textAnchor="middle" fontSize="10" fill="#94a3b8">Grand Finale</text>
                                </g>
                            </svg>
                        </div>
                        <p className="text-sm text-slate-500 mt-4 text-center italic">Journeying from the turquoise waters of the Costa Brava to the rugged peaks of the High Pyrenees.</p>
                    </div>

                    <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 md:p-8">
                        <div className="mb-8"><h3 className="text-2xl font-black flex items-center text-slate-800"><Icon name="MapPin" className="w-6 h-6 mr-3 text-red-500" />Google Maps Sync</h3></div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div><h4 className="font-black text-indigo-600 uppercase tracking-widest text-xs mb-5">Lodging Pins</h4><div className="space-y-2">{MAP_LOCATIONS.filter(l => l.category === 'Lodging').map((loc, i) => <LocationLink key={i} loc={loc} color="indigo" />)}</div></div>
                            <div><h4 className="font-black text-teal-600 uppercase tracking-widest text-xs mb-5">Activity & Dining Pins</h4><div className="space-y-2">{MAP_LOCATIONS.filter(l => l.category !== 'Lodging').map((loc, i) => <LocationLink key={i} loc={loc} color="teal" />)}</div></div>
                        </div>
                    </div>
                </div>
            );
        }

        function LocationLink({ loc, color }) {
            const colors = { indigo: "bg-indigo-50 text-indigo-600 hover:bg-indigo-100 border-indigo-100", teal: "bg-teal-50 text-teal-600 hover:bg-teal-100 border-teal-100" };
            return (
                <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc.query)}`} target="_blank" className={`flex items-center p-3 rounded-2xl border transition-all group ${colors[color]}`}>
                    <div className="w-8 h-8 rounded-xl bg-white flex items-center justify-center shrink-0 mr-4 font-black text-xs shadow-sm">{loc.day}</div>
                    <span className="flex-grow font-bold text-sm text-slate-800">{loc.name}</span>
                    <Icon name="ArrowRight" className="w-4 h-4 text-slate-300 group-hover:translate-x-1 transition-transform" />
                </a>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
