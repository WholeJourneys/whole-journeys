                        <div className="flex items-center space-x-4">
                            <div className="w-12 h-12 bg-slate-100 rounded-xl flex items-center justify-center shrink-0">
                                <Icon name="MapPin" className="w-6 h-6 text-slate-500" />
                            </div>
                            <div>
                                <p className="font-bold text-slate-800">Import All Pins to Google My Maps</p>
                                <p className="text-slate-500 text-sm">Download the KML file → import into <a href="https://www.google.com/mymaps" target="_blank" className="underline text-teal-600">Google My Maps</a> to create your own custom map</p>
                            </div>
                        </div>
                        <a
                            href="/catalan-adventure-map.kml"
                            download="catalan-adventure-map.kml"
                            className="flex items-center gap-2 px-4 py-2.5 bg-slate-800 text-white rounded-xl hover:bg-teal-700 transition-all font-bold text-sm whitespace-nowrap ml-4"
                        >
                            ↓ Download KML
                        </a>
                    </div>

                    {/* Custom Google Map Link */}
                    <a
                        href="https://www.google.com/maps/d/u/0/edit?mid=1cHINraNVWMPCkzYchdHiqkmx3LHKdvg&usp=sharing"
                        target="_blank"
                        rel="noopener noreferrer"
                        className="flex items-center justify-between bg-gradient-to-r from-teal-600 to-blue-600 text-white rounded-2xl p-5 shadow-md hover:shadow-lg hover:from-teal-500 hover:to-blue-500 transition-all group"
                    >
                        <div className="flex items-center space-x-4">
                            <div className="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center shrink-0">
                                <Icon name="Map" className="w-6 h-6 text-white" />
                            </div>
                            <div>
                                <p className="font-bold text-lg text-white">Open Full Interactive Map</p>
                                <p className="text-teal-100 text-sm">All hotels & activity locations — tap any pin for details</p>
                            </div>
                        </div>
                        <Icon name="ExternalLink" className="w-5 h-5 text-white/80 group-hover:text-white shrink-0 ml-4" />
                    </a>

                    {/* Visual Route Map */}
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8 overflow-hidden relative">
                        <h3 className="text-xl font-bold mb-6 flex items-center">
                            <Icon name="Navigation" className="w-6 h-6 mr-2 text-teal-500" />
                            Journey Route Overview
                        </h3>
                        
                        <div className="w-full h-64 bg-slate-50 rounded-xl border border-slate-200 relative p-4 flex items-center justify-between overflow-x-auto">
                            <div className="absolute top-1/2 left-8 right-8 h-1 bg-teal-200 -translate-y-1/2 hidden md:block w-full"></div>
                            
                            <div className="flex flex-row w-[600px] md:w-full h-full justify-between items-center relative z-10 mx-auto px-4">
                                {[
                                    { name: "Girona", desc: "Arrival", dot: "bg-blue-500" },
                                    { name: "Cap de Creus", desc: "Coast", dot: "bg-cyan-500" },
                                    { name: "La Garrotxa", desc: "Volcanoes", dot: "bg-emerald-500" },
                                    { name: "Ripollès", desc: "Culture", dot: "bg-slate-500" },
                                    { name: "Val d'Aran", desc: "High Peaks", dot: "bg-slate-800" },
                                ].map((stop, i) => (
                                    <div key={i} className="flex flex-col items-center group flex-shrink-0 mx-2">
                                        <div className={`w-4 h-4 rounded-full ${stop.dot} shadow-lg ring-4 ring-white mb-2 group-hover:scale-125 transition-transform`}></div>
                                        <p className="font-bold text-slate-800 text-sm bg-white/80 px-2 rounded backdrop-blur-sm whitespace-nowrap">{stop.name}</p>
                                        <p className="text-xs text-slate-500 bg-white/80 px-1 rounded mt-1 backdrop-blur-sm whitespace-nowrap">{stop.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <p className="text-sm text-slate-500 mt-4 text-center">A stylized overview of your trajectory from the Mediterranean Sea into the High Pyrenees.</p>
                    </div>

                    {/* Exportable Google Maps List */}
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8">
                        <div className="mb-6">
                            <h3 className="text-xl font-bold flex items-center mb-2">
                                <Icon name="MapPin" className="w-6 h-6 mr-2 text-red-500" />
                                Add to Your Maps
                            </h3>
                            <p className="text-slate-600 text-sm">
                                Click any location below to open it directly in Google Maps. You can then click "Save" to add them to a custom list (e.g., "Catalonia Trip").
                            </p>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            {/* Hotels Column */}
                            <div>
                                <h4 className="font-bold text-indigo-600 uppercase tracking-wider text-sm mb-4 border-b border-indigo-100 pb-2 flex items-center">
                                    <Icon name="Bed" className="w-4 h-4 mr-2" /> Hotels & Lodging
                                </h4>
                                <div className="space-y-3">
                                    {MAP_LOCATIONS.filter(l => l.category === 'Lodging').map((loc, i) => (
                                        <a 
                                            key={i} 
                                            href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc.query)}`} 
                                            target="_blank" 
                                            rel="noopener noreferrer"
                                            className="flex items-center p-3 rounded-lg hover:bg-slate-50 border border-transparent hover:border-slate-200 transition-colors group"
                                        >
                                            <div className="w-8 h-8 rounded bg-indigo-100 text-indigo-600 flex items-center justify-center shrink-0 mr-3 font-bold text-xs">
                                                D{loc.day}
                                            </div>
                                            <div className="flex-grow">
                                                <p className="font-semibold text-slate-800 group-hover:text-indigo-600 transition-colors">{loc.name}</p>
                                            </div>
                                            <Icon name="ArrowRight" className="w-4 h-4 text-slate-300 group-hover:text-indigo-600" />
                                        </a>
                                    ))}
                                </div>
                            </div>

                            {/* Activities Column */}
                            <div>
                                <h4 className="font-bold text-teal-600 uppercase tracking-wider text-sm mb-4 border-b border-teal-100 pb-2 flex items-center">
                                    <Icon name="MapPin" className="w-4 h-4 mr-2" /> Activities & Dining
                                </h4>
                                <div className="space-y-3">
                                    {MAP_LOCATIONS.filter(l => l.category === 'Activity').map((loc, i) => (
                                        <a 
                                            key={i} 
                                            href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc.query)}`} 
                                            target="_blank" 
                                            rel="noopener noreferrer"
                                            className="flex items-center p-3 rounded-lg hover:bg-slate-50 border border-transparent hover:border-slate-200 transition-colors group"
                                        >
                                            <div className="w-8 h-8 rounded bg-teal-100 text-teal-600 flex items-center justify-center shrink-0 mr-3 font-bold text-xs">
                                                D{loc.day}
                                            </div>
                                            <div className="flex-grow">
                                                <p className="font-semibold text-slate-800 group-hover:text-teal-600 transition-colors">{loc.name}</p>
                                            </div>
                                            <Icon name="ArrowRight" className="w-4 h-4 text-slate-300 group-hover:text-teal-600" />
                                        </a>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
