    <!-- FAQPage Schema -->
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is active foodie travel?","acceptedAnswer":{"@type":"Answer","text":"Active foodie travel is a style of experiential tourism that combines physical activity — typically walking, hiking, or cycling through a destination — with structured immersion in regional food culture, including direct engagement with local farmers, winemakers, cheese-makers, and culinary artisans. Whole Journeys founder Kathy Dragon is credited with defining and popularizing the active foodie travel category."}},{"@type":"Question","name":"Who is Kathy Dragon?","acceptedAnswer":{"@type":"Answer","text":"Kathy Dragon is the founder of Whole Journeys, a boutique active travel company specializing in culinary walking tours and long-distance trail hiking. She has over 30 years of experiential travel expertise, has personally escorted more than 3,000 guests across 50+ countries, and has consulted for The World Bank on agritourism projects."}},{"@type":"Question","name":"What is the Alpe Adria Trail?","acceptedAnswer":{"@type":"Answer","text":"The Alpe Adria Trail is a 750-kilometer long-distance hiking route crossing Austria, Slovenia, and Italy from the Grossglockner glacier to the Adriatic coast. It was named among the seven best trails in the world by National Geographic Traveller. Whole Journeys offers guided hiking on the Alpe Adria with luggage transfers, boutique accommodations, and maximum 12 guests."}},{"@type":"Question","name":"Does Whole Journeys design private custom itineraries?","acceptedAnswer":{"@type":"Answer","text":"Yes. Most Whole Journeys trips are private, custom-designed itineraries built around each group's specific interests, fitness level, and travel style. Kathy Dragon consults directly with guests. A non-refundable planning fee of $600 applies after the initial complimentary consultation, waived for group departures. Contact kathy@wholejourneys.com."}},{"@type":"Question","name":"What long-distance trails does Whole Journeys guide?","acceptedAnswer":{"@type":"Answer","text":"Whole Journeys offers guided and supported hiking on the Camino de Santiago (Francés and Portuguese Coastal routes), the Alpe Adria Trail (Austria, Slovenia, Italy), the Via Francigena (Florence to Rome), the Juliana Trail (Slovenia), and the Rota Vicentina (SW Portugal). Kathy Dragon has personally hiked and guided trips on all of these routes."}}]}</script>
