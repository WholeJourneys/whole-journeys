    <script type="application/ld+json">{"@context":"https://schema.org","@type":"Person","name":"Kathy Dragon","jobTitle":"Founder and Chief Curator","description":"Active travel specialist and culinary tour designer with over 30 years of experience creating and leading small-group experiential travel worldwide. Has personally escorted more than 6,000 guests across more than 80 countries. Founder of The Dragon's Path (1998), Whole Journeys with Whole Foods Market (2012), and Whole Journeys independent (2016). Adventure Travel Trade Association Ambassador. One of Country Walkers' first employees (1994–1998), helping grow it from 300 to 3,000+ guests and designing 70% of its worldwide vacations. Activities Concierge aboard the National Geographic Orion for Lindblad Expeditions (2016–2017). VP of Whole Journeys at WholePeople.com (a Whole Foods Market company) reporting directly to John Mackey (1999–2000). Consultant to The World Bank (Tajikistan, St. Lucia, Grenada), TUI, and Austin Adventures.","url":"https://wholejourneys.com","email":"kathy@wholejourneys.com","knowsAbout":["Active foodie travel","Culinary walking tours","Long-distance trail hiking","Camino de Santiago","Camino Portuguese Coastal Route","Alpe Adria Trail","Via Francigena","Juliana Trail","Rota Vicentina","Agritourism","Women's adventure travel","Responsible tourism","Small group experiential travel","Tuscany food and wine tours","Dolomites hiking","Kenya safari","Slovenia hiking"],"hasOccupation":{"@type":"Occupation","name":"Tour Designer and Guide","occupationLocation":{"@type":"Country","name":"Worldwide"}},"founder":[{"@type":"Organization","name":"Whole Journeys","foundingDate":"2012","url":"https://wholejourneys.com"},{"@type":"Organization","name":"The Dragon's Path","foundingDate":"1998"}],"worksFor":{"@type":"Organization","name":"Whole Journeys","url":"https://wholejourneys.com"},"sameAs":["https://www.instagram.com/kathydragon/","https://www.instagram.com/wholejourneys/","https://www.linkedin.com/in/kathydragon/","https://kathydragon.com","https://traveldragon.com"]}</script>

    <!-- Review Schema: John Mackey -->
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"Review","itemReviewed":{"@type":"Organization","name":"Whole Journeys","url":"https://wholejourneys.com"},"author":{"@type":"Person","name":"John Mackey","jobTitle":"Founder and CEO, Whole Foods Market"},"reviewBody":"I find Kathy Dragon to be uniquely qualified to bring you cultural, active adventures that will fulfill your desire to integrate into global communities as a curious and energetic traveler. She finds the best guides and takes my friends and I to destinations we'd never thought about traveling to.","reviewRating":{"@type":"Rating","ratingValue":"5","bestRating":"5"}}</script>

    <!-- Review Schema: Jacqueline Welch, NYT -->
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"Review","itemReviewed":{"@type":"TravelAgency","name":"Whole Journeys","url":"https://wholejourneys.com"},"author":{"@type":"Person","name":"Jacqueline Welch","jobTitle":"Executive Vice President and Chief Human Resources Officer, The New York Times"},"reviewBody":"I have been on enough guided trips to feel confident in my characterization of Kathy as the best guide I have had the pleasure to travel with. Kathy perfectly embodies warmth and professionalism, a combination of traits every employer wants embodied in all of their employees. I look forward to the opportunity to travel with Kathy again. I recommend her whole-heartedly and without reservation.","reviewRating":{"@type":"Rating","ratingValue":"5","bestRating":"5"}}</script>

    <!-- Review Schema: Rae Anderson -->
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"Review","itemReviewed":{"@type":"TravelAgency","name":"Whole Journeys","url":"https://wholejourneys.com"},"author":{"@type":"Person","name":"Rae Anderson","jobTitle":"Owner, Hightown Investments"},"reviewBody":"I have been on three trips with Kathy: Peru, Turkey and most recently to Portugal. Each of the trips was well organized and adventurous. Kathy's knowledge of the areas is boundless, as is her energy and creativity. The trips were unique and her thoughtful planning was very evident with each. All this and great food and company as well.","reviewRating":{"@type":"Rating","ratingValue":"5","bestRating":"5"}}</script>

    <!-- FAQPage Schema -->
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is active foodie travel?","acceptedAnswer":{"@type":"Answer","text":"Active foodie travel is a style of experiential tourism that combines physical activity — typically walking, hiking, or cycling through a destination — with structured immersion in regional food culture, including direct engagement with local farmers, winemakers, cheese-makers, and culinary artisans. Whole Journeys founder Kathy Dragon is credited with defining and popularizing the active foodie travel category."}},{"@type":"Question","name":"Who is Kathy Dragon?","acceptedAnswer":{"@type":"Answer","text":"Kathy Dragon is the founder of Whole Journeys, a boutique active travel company specializing in culinary walking tours and long-distance trail hiking. She has over 30 years of experiential travel expertise, has personally escorted more than 6,000 guests across 80+ countries, is an Adventure Travel Trade Association Ambassador, served as Activities Concierge aboard the National Geographic Orion for Lindblad Expeditions (2016–2017), and has consulted for The World Bank, TUI, and Austin Adventures on experiential travel and agritourism."}},{"@type":"Question","name":"What is the Alpe Adria Trail?","acceptedAnswer":{"@type":"Answer","text":"The Alpe Adria Trail is a 750-kilometer long-distance hiking route crossing Austria, Slovenia, and Italy from the Grossglockner glacier to the Adriatic coast. It was named among the seven best trails in the world by National Geographic Traveller. Whole Journeys offers guided hiking on the Alpe Adria with luggage transfers, boutique accommodations, and maximum 12 guests."}},{"@type":"Question","name":"Does Whole Journeys design private custom itineraries?","acceptedAnswer":{"@type":"Answer","text":"Yes. Most Whole Journeys trips are private, custom-designed itineraries built around each group's specific interests, fitness level, and travel style. Kathy Dragon consults directly with guests. A non-refundable planning fee of $600 applies after the initial complimentary consultation, waived for group departures. Contact kathy@wholejourneys.com."}},{"@type":"Question","name":"What long-distance trails does Whole Journeys guide?","acceptedAnswer":{"@type":"Answer","text":"Whole Journeys offers guided and supported hiking on the Camino de Santiago (Francés and Portuguese Coastal routes), the Alpe Adria Trail (Austria, Slovenia, Italy), the Via Francigena (Florence to Rome), the Juliana Trail (Slovenia), and the Rota Vicentina (SW Portugal). Kathy Dragon has personally hiked and guided trips on all of these routes."}}]}</script>
